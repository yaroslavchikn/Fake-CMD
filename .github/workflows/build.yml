name: Build EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Обновлено до v4
    
    - name: Setup Python
      uses: actions/setup-python@v5  # Обновлено до v5 (рекомендуется)
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --name FakeCMD --icon=NUL main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4  # ГЛАВНОЕ ИЗМЕНЕНИЕ: v3 -> v4
      with:
        name: FakeCMD
        path: dist/FakeCMD.exe
