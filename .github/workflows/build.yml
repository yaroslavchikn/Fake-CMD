name: Build Fake CMD EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name="FakeCMD" --add-data "src;src" src/main.py
    
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: FakeCMD
        path: dist/FakeCMD.exe
        if-no-files-found: error
